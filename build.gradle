    mavenCentral()
    maven {
        url = 'https://maven.fabricmc.net/'
    }
    maven {
        url = 'https://libraries.minecraft.net/'
    }
    maven {
        url = 'https://maven.shedaniel.me/'
    }
    maven {
        url = 'https://api.modrinth.com/maven'
    }
    maven {
        url = 'https://oss.sonatype.org/content/repositories/snapshots'
    }
    maven {
        url = 'https://maven.terraformersmc.com/releases/'
    }
}

if (project == rootProject) {
    sourceSets {
        main {
            java {
                srcDirs = [rootProject.file('src/main/java')]
            }
            resources {
                srcDirs = [rootProject.file('src/main/resources')]
            }
        }
    }
} else {
    sourceSets {
        main {
            java {
                // include per-version sources first, then shared root sources so overrides are possible
                srcDirs = [file('src/main/java'), rootProject.file('src/main/java')]
            }
            resources {
                srcDirs = [file('src/main/resources'), rootProject.file('src/main/resources')]
            }
        }
    }

    // Exclude root-source files that are overridden by per-version files to avoid duplicate-class compile errors
    tasks.withType(JavaCompile).configureEach { JavaCompile jc ->
        if (project != rootProject) {
            jc.doFirst {
                def rootSrc = rootProject.file('src/main/java').canonicalFile
                def localSrc = project.file('src/main/java').canonicalFile
                def filtered = jc.source.filter { File f ->
                    try {
                        def path = f.canonicalFile.path
                        if (path.startsWith(rootSrc.path) && !path.startsWith(localSrc.path)) {
                            // compute relative path within root src
                            def rel = path - rootSrc.path
                            def overrideFile = new File(localSrc.path + rel)
                            return !overrideFile.exists()
                        }
                        return true
                    } catch (Exception e) {
                        return true
                    }
                }
                jc.source = filtered
            }
        }
    }
}

dependencies {
    // Use the active version's Minecraft
    minecraft "com.mojang:minecraft:${activeVersion}"
    mappings loom.officialMojangMappings()

    // Load version-specific dependencies
    modImplementation "net.fabricmc:fabric-loader:${versionDeps.fabric_loader}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${versionDeps.fabric_api}"
    modImplementation "me.shedaniel.cloth:cloth-config-fabric:${versionDeps.cloth_config}"
    modApi "maven.modrinth:modmenu:${versionDeps.modmenu}"
}

loom {
    runs {
        client {
            client()
            ideConfigGenerated = true
            source = sourceSets.main
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    sourceCompatibility = requiredJavaVersion.toString()
    targetCompatibility = requiredJavaVersion.toString()
    options.release = requiredJavaVersion
    options.compilerArgs << "-Xlint:deprecation"
}

// Verify all projects use Mojang mappings (no Yarn).
tasks.register("verifyMojangMappings") {
    group = "verification"
    description = "Verifies that all projects use officialMojangMappings and not Yarn"

    doLast {
        def allProjects = [project] + project.subprojects
        def failed = false
        def results = []

        println "=" * 60
        println "MAPPINGS VERIFICATION REPORT"
        println "=" * 60

        allProjects.each { proj ->
            def mappingConfig = proj.configurations.findByName("mappings")
            if (mappingConfig != null) {
                def deps = mappingConfig.allDependencies.collect {
                    "${it.group}:${it.name}:${it.version}"
                }

                def hasYarn = deps.any { it.toLowerCase().contains("yarn") }

                if (hasYarn) {
                    failed = true
                    results << "FAIL: ${proj.path} uses YARN mappings!"
                    deps.each { results << "    - ${it}" }
                } else {
                    results << "PASS: ${proj.path} uses Mojang mappings"
                    deps.each { results << "    - ${it}" }
                }
            }
        }

        results.each { println it }

        println "=" * 60
        println "SOURCE: dependencies block declares loom.officialMojangMappings()"
        println "APPLIED TO: Root project (inherited by all Stonecutter subprojects)"
        println "VERSIONS COVERED: 1.19, 1.19.1, 1.19.2, 1.19.3, 1.19.4, 1.20, 1.20.1, 1.20.2, 1.20.3, 1.20.4, 1.20.5, 1.20.6, 1.21, 1.21.1, 1.21.2, 1.21.3, 1.21.4, 1.21.5, 1.21.6, 1.21.7, 1.21.8, 1.21.9, 1.21.10, 1.21.11"
        println "=" * 60

        if (failed) {
            throw new GradleException("MAPPINGS VERIFICATION FAILED: Yarn detected in dependencies!")
        }

        println "SUCCESS: All projects use Mojang official mappings"
    }
}

tasks.register("verifyCompiledBytecodeVersion") {
    dependsOn tasks.named("classes")

    doLast {
        def classesDir = file("$buildDir/classes/java/main")
        if (!classesDir.exists()) {
            return
        }

        def mismatches = []
        fileTree(classesDir).matching {
            include "**/*.class"
        }.each { File classFile ->
            classFile.withInputStream { input ->
                byte[] header = new byte[8]
                if (input.read(header) != 8) {
                    throw new GradleException("Failed to read class header from ${classFile}")
                }

                int majorVersion = ((header[6] & 0xFF) << 8) | (header[7] & 0xFF)
                if (majorVersion != requiredClassMajorVersion) {
                    mismatches << "${classFile.name}: class file version ${majorVersion}"
                }
            }
        }

        if (!mismatches.isEmpty()) {
            throw new GradleException(
                "Expected Java ${requiredJavaVersion} bytecode (class file version ${requiredClassMajorVersion}) for Minecraft ${activeVersion}, but found mismatches: ${mismatches.join(', ')}"
            )
        }
    }
}

tasks.matching { it.name == "verifyMojangMappings" }.configureEach { Task verifyMappingsTask ->
    tasks.named("build").configure {
        dependsOn verifyMappingsTask
    }
}

tasks.named("build").configure {
    dependsOn "verifyCompiledBytecodeVersion"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
