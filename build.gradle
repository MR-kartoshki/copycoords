// Default and active version for local development.
String defaultVersion = '1.21.11'
def scExt = project.extensions.findByName('stonecutter')
def scVersion = scExt?.current?.version
String configuredVersion = project.findProperty('MC_VERSION')?.toString()
String projectVersion = ext.gameVersions.containsKey(project.projectDir.name) ? project.projectDir.name : null
String activeVersion = configuredVersion ?: (projectVersion ?: (scVersion?.toString() ?: defaultVersion))
println "Building for Minecraft version: ${activeVersion}"

def java17Versions = [
    '1.19',
    '1.19.1',
    '1.19.2',
    '1.19.3',
    '1.19.4',
    '1.20',
    '1.20.1',
    '1.20.2',
    '1.20.3',
    '1.20.4'
] as Set
int requiredJavaVersion = java17Versions.contains(activeVersion) ? 17 : 21
int requiredClassMajorVersion = requiredJavaVersion == 17 ? 61 : 65

// Project metadata.
group = project.maven_group
version = project.mod_version

// Resolve dependency set for the active version.
def versionDeps = ext.gameVersions[activeVersion]
if (!versionDeps) {
    throw new GradleException("Unknown Minecraft version: ${activeVersion}. Supported versions: ${ext.gameVersions.keySet()}")
}

// Include active version in the artifact base name.
base {
    archivesName = project.archives_base_name + "+${activeVersion}"
}

